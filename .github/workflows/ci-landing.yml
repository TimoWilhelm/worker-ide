name: CI Landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/ci-landing.yml'
      - '.github/workflows/deploy-landing.yml'
  pull_request:
    branches: [main]
    paths:
      - 'landing/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/ci-landing.yml'
      - '.github/workflows/deploy-landing.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -Eeuxo pipefail {0}

env:
  DO_NOT_TRACK: 1

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            landing/node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            landing/node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true

      - name: Typecheck landing
        run: bun run --cwd landing typecheck

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            landing/node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true

      - name: Build landing
        run: bun run --cwd landing build
