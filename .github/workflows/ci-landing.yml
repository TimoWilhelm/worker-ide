name: CI Landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/ci-landing.yml'
      - '.github/workflows/deploy-landing.yml'
  pull_request:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/ci-landing.yml'
      - '.github/workflows/deploy-landing.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -Eeuxo pipefail {0}
    working-directory: landing

env:
  DO_NOT_TRACK: 1

jobs:
  check:
    name: Format, Lint & Knip
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-landing-${{ hashFiles('landing/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-landing-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run format

      - name: Lint
        run: bun run lint

      - name: Knip
        run: bun run knip

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-landing-${{ hashFiles('landing/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-landing-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-landing-${{ hashFiles('landing/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-landing-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
